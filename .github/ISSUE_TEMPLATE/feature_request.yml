name: ✨ Feature Request
description: Suggest an idea for Motrix Next
title: "[feat]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement!
        Please check [existing issues](https://github.com/AnInsomniacy/motrix-next/issues) and [discussions](https://github.com/AnInsomniacy/motrix-next/discussions) before submitting.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What frustration are you experiencing?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to happen. Be as specific as possible.
      placeholder: "I would like to..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've thought of.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add mockups, screenshots, links to similar features in other apps, or any other context.

  - type: checkboxes
    id: validations
    attributes:
      label: Validations
      options:
        - label: I have searched the [existing issues](https://github.com/AnInsomniacy/motrix-next/issues) and this feature has not been requested before.
          required: true
        - label: I have read the [Contributing Guide](https://github.com/AnInsomniacy/motrix-next/blob/main/docs/CONTRIBUTING.md) and understand that new features require an approved issue before a PR is submitted.
          required: true
