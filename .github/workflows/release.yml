name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            label: macos-aarch64
          - platform: macos-15-intel
            args: --target x86_64-apple-darwin
            label: macos-x86_64
          - platform: windows-latest
            args: --target x86_64-pc-windows-msvc --bundles nsis
            label: windows-x86_64
          - platform: windows-latest
            args: --target aarch64-pc-windows-msvc --bundles nsis
            label: windows-aarch64
          - platform: ubuntu-22.04
            args: --target x86_64-unknown-linux-gnu
            label: linux-x86_64
          - platform: ubuntu-22.04-arm
            args: --target aarch64-unknown-linux-gnu
            label: linux-aarch64

          # ── QEMU-emulated platforms ────────────────────────────────
          # These run inside emulated containers via uraimo/run-on-arch-action.
          # Steps are split into two paths: native (if: !matrix.qemu) and
          # QEMU (if: matrix.qemu).  Only .deb bundles — linuxdeploy for
          # AppImage lacks pre-built binaries for these architectures.
          - platform: ubuntu-latest
            label: linux-riscv64
            qemu: true
            qemu_arch: riscv64
            qemu_distro: ubuntu24.04
          - platform: ubuntu-latest
            label: linux-loongarch64
            qemu: true
            qemu_arch: none
            qemu_distro: none
            qemu_base_image: "--platform=linux/loong64 ghcr.io/loong64/debian:trixie-slim"
            qemu_binfmt: true

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      # ────────────────────────────────────────────────────────────────
      # Path ①: Native build (existing 6 platforms)
      # ────────────────────────────────────────────────────────────────

      - uses: pnpm/action-setup@v4
        if: ${{ !matrix.qemu }}

      - uses: actions/setup-node@v5
        if: ${{ !matrix.qemu }}
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        if: ${{ !matrix.qemu }}

      # Cross-compilation: add the secondary Rust target when building for
      # a different architecture on the same OS runner.
      # - macOS x86_64 uses a native Intel runner (macos-13), no cross-compile needed.
      # - Windows ARM64 cross-compiles on x64 runner (NSIS is arch-agnostic).
      - name: Add cross-compilation target
        if: ${{ !matrix.qemu && contains(matrix.args, 'aarch64-pc-windows-msvc') }}
        shell: bash
        run: |
          TARGET=$(echo '${{ matrix.args }}' | sed 's/.*--target \([^ ]*\).*/\1/')
          rustup target add "$TARGET"

      - uses: swatinem/rust-cache@v2
        if: ${{ !matrix.qemu }}

      # Suppress needrestart daemon (auto-restarts services on package
      # install, can kill the runner agent and cause "operation canceled").
      - name: Install Linux dependencies
        if: ${{ !matrix.qemu && runner.os == 'Linux' }}
        run: |
          export NEEDRESTART_SUSPEND=1
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo -E apt-get install -y \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf xdg-utils

      - run: pnpm install
        if: ${{ !matrix.qemu }}

      - uses: tauri-apps/tauri-action@v0
        if: ${{ !matrix.qemu }}
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event.release.tag_name || '' }}
          releaseId: ${{ github.event_name == 'release' && github.event.release.id || '' }}
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      - name: Upload build artifacts (manual trigger only)
        if: ${{ !matrix.qemu && github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v6
        with:
          name: motrix-next-${{ matrix.label }}
          path: "${{ join(fromJSON(steps.tauri.outputs.artifactPaths), '\n') }}"
          retention-days: 7

      # ────────────────────────────────────────────────────────────────
      # Path ②: QEMU-emulated build (riscv64, loongarch64)
      #
      # Builds natively inside an emulated container.  Ubuntu 24.04 is
      # required for riscv64 (22.04 lacks webkit2gtk-4.1-dev).  LoongArch64
      # uses Debian Trixie via a community Docker image and requires
      # explicit binfmt handler registration.
      # ────────────────────────────────────────────────────────────────

      - name: Register LoongArch64 QEMU binfmt handler
        if: ${{ matrix.qemu_binfmt }}
        run: |
          docker run --privileged --rm ghcr.io/loong64/binfmt --install all

      - name: Build in QEMU container
        if: ${{ matrix.qemu }}
        uses: uraimo/run-on-arch-action@v3
        with:
          arch: ${{ matrix.qemu_arch }}
          distro: ${{ matrix.qemu_distro }}
          base_image: ${{ matrix.qemu_base_image || '' }}
          githubToken: ${{ github.token }}

          dockerRunArgs: |
            --volume "${PWD}/output:/output"

          setup: |
            mkdir -p "${PWD}/output"

          install: |
            apt-get update -y
            apt-get install -y curl wget file build-essential pkg-config \
              libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
              librsvg2-dev patchelf libssl-dev xdg-utils
            curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
            apt-get install -y nodejs
            npm install -g pnpm
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y

          run: |
            source "$HOME/.cargo/env"
            pnpm install
            npx tauri build --bundles deb
            cp src-tauri/target/release/bundle/deb/*.deb /output/ 2>/dev/null || true
            ls -la /output/

      - name: Upload QEMU artifacts to Release
        if: ${{ matrix.qemu && github.event_name == 'release' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          files=(output/*.deb output/*.sig)
          if [ ${#files[@]} -gt 0 ]; then
            gh release upload "${{ github.event.release.tag_name }}" \
              "${files[@]}" --clobber \
              -R "${{ github.repository }}"
          fi

      - name: Upload QEMU build artifacts (manual trigger only)
        if: ${{ matrix.qemu && github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v6
        with:
          name: motrix-next-${{ matrix.label }}
          path: output/*.deb
          retention-days: 7

  merge-updater-json:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - name: Generate and upload channel-specific updater JSON
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          BASE="https://github.com/${{ github.repository }}/releases/download/$TAG"

          # Determine channel from tag name
          if [[ "$TAG" == *"-beta"* ]] || [[ "$TAG" == *"-alpha"* ]] || [[ "$TAG" == *"-rc"* ]]; then
            JSON_FILE="beta.json"
            echo "Channel: BETA (tag=$TAG)"
          else
            JSON_FILE="latest.json"
            echo "Channel: STABLE (tag=$TAG)"
          fi

          # Fetch release notes from the GitHub Release body
          NOTES=$(gh release view "$TAG" -R "${{ github.repository }}" --json body -q .body || echo "")

          mkdir -p sigs
          gh release download "$TAG" -R "${{ github.repository }}" -p "*.sig" -D sigs

          echo "Downloaded signatures:"
          ls -la sigs/

          read_sig() { [ -f "$1" ] && cat "$1" || echo ""; }

          DARWIN_SIG=$(read_sig "sigs/MotrixNext_aarch64.app.tar.gz.sig")
          DARWIN_X64_SIG=$(read_sig "sigs/MotrixNext_x64.app.tar.gz.sig")
          WINDOWS_SIG=$(read_sig "sigs/MotrixNext_${VERSION}_x64-setup.exe.sig")
          WINDOWS_ARM_SIG=$(read_sig "sigs/MotrixNext_${VERSION}_arm64-setup.exe.sig")
          LINUX_X64_SIG=$(read_sig "sigs/MotrixNext_${VERSION}_amd64.AppImage.sig")
          LINUX_ARM_SIG=$(read_sig "sigs/MotrixNext_${VERSION}_aarch64.AppImage.sig")
          LINUX_X64_DEB_SIG=$(read_sig "sigs/MotrixNext_${VERSION}_amd64.deb.sig")
          LINUX_ARM_DEB_SIG=$(read_sig "sigs/MotrixNext_${VERSION}_arm64.deb.sig")
          LINUX_RV64_DEB_SIG=$(read_sig "sigs/MotrixNext_${VERSION}_riscv64.deb.sig")
          LINUX_LA64_DEB_SIG=$(read_sig "sigs/MotrixNext_${VERSION}_loongarch64.deb.sig")

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg notes "$NOTES" \
            --arg darwin_sig "$DARWIN_SIG" \
            --arg darwin_url "$BASE/MotrixNext_aarch64.app.tar.gz" \
            --arg darwin_x64_sig "$DARWIN_X64_SIG" \
            --arg darwin_x64_url "$BASE/MotrixNext_x64.app.tar.gz" \
            --arg win_sig "$WINDOWS_SIG" \
            --arg win_url "$BASE/MotrixNext_${VERSION}_x64-setup.exe" \
            --arg wina_sig "$WINDOWS_ARM_SIG" \
            --arg wina_url "$BASE/MotrixNext_${VERSION}_arm64-setup.exe" \
            --arg lx64_sig "$LINUX_X64_SIG" \
            --arg lx64_url "$BASE/MotrixNext_${VERSION}_amd64.AppImage" \
            --arg larm_sig "$LINUX_ARM_SIG" \
            --arg larm_url "$BASE/MotrixNext_${VERSION}_aarch64.AppImage" \
            --arg ldebx64_sig "$LINUX_X64_DEB_SIG" \
            --arg ldebx64_url "$BASE/MotrixNext_${VERSION}_amd64.deb" \
            --arg ldebarm_sig "$LINUX_ARM_DEB_SIG" \
            --arg ldebarm_url "$BASE/MotrixNext_${VERSION}_arm64.deb" \
            --arg ldebrv64_sig "$LINUX_RV64_DEB_SIG" \
            --arg ldebrv64_url "$BASE/MotrixNext_${VERSION}_riscv64.deb" \
            --arg ldebla64_sig "$LINUX_LA64_DEB_SIG" \
            --arg ldebla64_url "$BASE/MotrixNext_${VERSION}_loongarch64.deb" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $darwin_sig, url: $darwin_url },
                "darwin-x86_64": { signature: $darwin_x64_sig, url: $darwin_x64_url },
                "windows-x86_64": { signature: $win_sig, url: $win_url },
                "windows-aarch64": { signature: $wina_sig, url: $wina_url },
                "linux-x86_64": { signature: $lx64_sig, url: $lx64_url },
                "linux-aarch64": { signature: $larm_sig, url: $larm_url },
                "linux-x86_64-deb": { signature: $ldebx64_sig, url: $ldebx64_url },
                "linux-aarch64-deb": { signature: $ldebarm_sig, url: $ldebarm_url },
                "linux-riscv64-deb": { signature: $ldebrv64_sig, url: $ldebrv64_url },
                "linux-loongarch64-deb": { signature: $ldebla64_sig, url: $ldebla64_url }
              }
            }' > "$JSON_FILE"

          echo "Generated $JSON_FILE:"
          cat "$JSON_FILE"

          # Ensure the permanent 'updater' release tag exists
          gh release view updater -R "${{ github.repository }}" 2>/dev/null || \
            gh release create updater \
              --title "Auto-Updater Assets" \
              --notes "Managed by CI. Do not delete. Contains latest.json and beta.json for the Tauri updater." \
              --latest=false \
              -R "${{ github.repository }}"

          # Upload (overwrite) the channel JSON to the fixed 'updater' tag
          gh release upload updater "$JSON_FILE" --clobber -R "${{ github.repository }}"
          echo "Uploaded $JSON_FILE to 'updater' release"

  update-homebrew:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && !github.event.release.prerelease

    steps:
      - name: Download macOS artifacts and compute checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"

          gh release download "$TAG" \
            -R "${{ github.repository }}" \
            -p "MotrixNext_aarch64.app.tar.gz" \
            -p "MotrixNext_x64.app.tar.gz"

          ARM_SHA=$(shasum -a 256 MotrixNext_aarch64.app.tar.gz | cut -d ' ' -f1)
          INTEL_SHA=$(shasum -a 256 MotrixNext_x64.app.tar.gz | cut -d ' ' -f1)

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "ARM_SHA=$ARM_SHA" >> "$GITHUB_ENV"
          echo "INTEL_SHA=$INTEL_SHA" >> "$GITHUB_ENV"

      - name: Update Homebrew Cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/AnInsomniacy/homebrew-motrix-next.git"
          cd homebrew-motrix-next

          # Generate the entire cask file from a template instead of using
          # fragile sed replacements. Shell expands $VERSION, $ARM_SHA, and
          # $INTEL_SHA; Ruby interpolations (#{version}, #{arch}) pass through
          # literally because #{ is not shell syntax.
          cat > Casks/motrix-next.rb << CASK_EOF
          cask "motrix-next" do
            arch arm: "aarch64", intel: "x64"

            version "$VERSION"
            sha256 arm:   "$ARM_SHA",
                   intel: "$INTEL_SHA"

            url "https://github.com/AnInsomniacy/motrix-next/releases/download/v#{version}/MotrixNext_#{arch}.app.tar.gz"
            name "Motrix Next"
            desc "Full-featured download manager built with Tauri"
            homepage "https://github.com/AnInsomniacy/motrix-next"

            livecheck do
              url :url
              strategy :github_latest
            end

            auto_updates true

            app "MotrixNext.app"

            zap trash: [
              "~/Library/Application Support/com.motrix.next",
              "~/Library/Caches/com.motrix.next",
              "~/Library/Logs/com.motrix.next",
              "~/Library/WebKit/com.motrix.next",
            ]
          end
          CASK_EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/motrix-next.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "motrix-next $VERSION"
          git push
